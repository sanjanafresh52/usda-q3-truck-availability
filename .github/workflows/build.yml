name: Build Q3 Availability Dashboard

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch AMS refrigerated truck availability
        # SOCRATA_APP_TOKEN is optional; the dataset is public.
        # If you have one, add it as a repo secret with this name.
        env:
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
        run: python scripts/fetch_availability.py

      - name: Commit refreshed q3_availability.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/q3_availability.json
          if git diff --cached --quiet; then
            echo "No changes in q3_availability.json"
          else
            git commit -m "Refresh q3_availability.json from Socrata [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Build dashboard HTML
        run: python scripts/build_dashboard.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
